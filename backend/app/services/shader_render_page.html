<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shader Render</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
// Shadertoy-compatible WebGL renderer (no UI chrome, pure shader output)
(function() {
  const canvas = document.getElementById('canvas');
  const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
  if (!gl) { console.error('WebGL not available'); return; }

  // Parse URL: ?shader=<base64>&t=<time>&w=<width>&h=<height>
  const params = new URLSearchParams(location.search);
  const shaderB64 = params.get('shader') || '';
  const tParam = parseFloat(params.get('t') || '1.0');
  const w = parseInt(params.get('w') || '1280');
  const h = parseInt(params.get('h') || '720');
  canvas.width = w;
  canvas.height = h;

  let shaderCode = '';
  try {
    shaderCode = atob(shaderB64.replace(/-/g, '+').replace(/_/g, '/'));
  } catch (e) {
    console.error('Failed to decode shader base64:', e);
    return;
  }

  // Vertex shader: full-screen quad
  const vsSource = `#version 100
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }`;

  // Fragment shader: Shadertoy wrapper around user code
  const userCode = shaderCode;
  const fsHeader = `#version 100
precision highp float;
uniform float iTime;
uniform vec3 iResolution;
`;

  const fsFooter = `
vec4 _mainWrapper(vec2 fragCoord) {
  vec4 fragColor;
  mainImage(fragColor, fragCoord);
  return fragColor;
}
void main() {
  vec4 c = _mainWrapper(gl_FragCoord.xy);
  gl_FragColor = vec4(c.rgb, 1.0);
}`;

  // Combine (user code goes between header and footer)
  const fsSource = fsHeader + '\n' + userCode + '\n' + fsFooter;

  function compileShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(shader));
      console.error('Source:', source);
      return null;
    }
    return shader;
  }

  const vs = compileShader(gl.VERTEX_SHADER, vsSource);
  const fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
  if (!vs || !fs) {
    window.__shaderReady = true;  // signal even on failure so screenshot can be taken
    window.__shaderError = true;
    return;
  }

  const program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(program));
    window.__shaderReady = true;
    window.__shaderError = true;
    return;
  }
  gl.useProgram(program);

  // Full-screen quad
  const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(program, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // Uniforms
  const uTime = gl.getUniformLocation(program, 'iTime');
  const uRes = gl.getUniformLocation(program, 'iResolution');

  // Render at given time
  function render(timeSec) {
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, timeSec);
    if (uRes) gl.uniform3f(uRes, canvas.width, canvas.height, 1.0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  // Initial render
  render(tParam);

  // For animated shaders, support time updates
  window.__setShaderTime = function(t) { render(t); };

  // Signal ready
  window.__shaderReady = true;
})();
</script>
</body>
</html>
